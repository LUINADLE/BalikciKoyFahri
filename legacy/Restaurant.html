/* ═══════════════════════════════════════════
   TWEAKS — minimal inline implementation
   ═══════════════════════════════════════════ */
function useTweaks(def) {
  const KEY = 'marea_tw';
  const [t, setT] = React.useState(() => {
    try { const s = JSON.parse(localStorage.getItem(KEY)); return s ? {...def,...s} : {...def}; }
    catch { return {...def}; }
  });
  const set = (k, v) => setT(p => {
    const n = typeof k === 'object' ? {...p,...k} : {...p,[k]:v};
    try { localStorage.setItem(KEY, JSON.stringify(n)); } catch {}
    return n;
  });
  return [t, set];
}
function TweaksPanel({children}) {
  const [on, setOn] = React.useState(false);
  React.useEffect(() => {
    const h = e => {
      if (e.data?.__type==='__activate_edit_mode'||e.data==='__activate_edit_mode') setOn(true);
      if (e.data?.__type==='__deactivate_edit_mode'||e.data==='__deactivate_edit_mode') setOn(false);
    };
    window.addEventListener('message', h);
    try { window.parent.postMessage({type:'__edit_mode_available',keys:[]}, '*'); } catch {}
    return () => window.removeEventListener('message', h);
  }, []);
  if (!on) return null;
  return (
    <div style={{position:'fixed',bottom:'1.5rem',right:'1.5rem',background:'#fff',border:'1px solid #e0e0e0',borderRadius:10,padding:'1.25rem 1rem',zIndex:9999,minWidth:220,boxShadow:'0 8px 32px rgba(0,0,0,.15)',fontFamily:'Inter,sans-serif'}}>
      <div style={{fontWeight:600,fontSize:'.72rem',letterSpacing:'.1em',textTransform:'uppercase',color:'#333',marginBottom:'.75rem',paddingBottom:'.5rem',borderBottom:'1px solid #eee'}}>Tweaks</div>
      {children}
    </div>
  );
}
function TweakSection({label}) { return <div style={{fontSize:'.62rem',fontWeight:600,letterSpacing:'.15em',textTransform:'uppercase',color:'#aaa',margin:'.75rem 0 .4rem'}}>{label}</div>; }
function TweakColor({label, value, options, onChange}) {
  return (
    <div style={{marginBottom:'.75rem'}}>
      <div style={{fontSize:'.75rem',color:'#555',marginBottom:'.35rem'}}>{label}</div>
      <div style={{display:'flex',gap:'.4rem'}}>
        {options.map(o => <button key={o} onClick={()=>onChange(o)} style={{width:22,height:22,background:o,borderRadius:'50%',border:value===o?'3px solid #333':'3px solid transparent',cursor:'pointer'}}/>)}
      </div>
    </div>
  );
}
function TweakRadio({label, value, options, onChange}) {
  return (
    <div style={{marginBottom:'.75rem'}}>
      <div style={{fontSize:'.75rem',color:'#555',marginBottom:'.35rem'}}>{label}</div>
      <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap'}}>

}

/* ═══════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════ */
function Nav({page, go}) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', h, {passive:true});
    return () => window.removeEventListener('scroll', h);
  }, []);
  React.useEffect(() => { window.scrollTo({top:0}); }, [page]);
  const tp = page === 'home' && !scrolled;
  const links = [['home','Home'],['menu','Menu'],['gallery','Gallery'],['contact','Reservations']];
  const lkS = (id) => ({
    fontFamily:'var(--sans)', fontSize:'.68rem', fontWeight:500,
    letterSpacing:'.18em', textTransform:'uppercase',
    color: page===id ? 'var(--bronze)' : 'rgba(255,255,255,.65)',
    borderBottom: page===id ? '1px solid var(--bronze)' : '1px solid transparent',
    paddingBottom: 2, background:'none', border:'none',
    borderBottom: page===id ? '1px solid var(--bronze)' : '1px solid transparent',
    cursor:'pointer', transition:'color .2s',
  });
  return (
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:300,height:'var(--nav)',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 3rem',background:tp?'transparent':'var(--navy)',borderBottom:tp?'none':'1px solid rgba(255,255,255,.07)',transition:'background .5s ease'}}>
      <button onClick={()=>go('home')} style={{fontFamily:'var(--srf)',fontSize:'1.65rem',fontStyle:'italic',color:'#fff',fontWeight:400,letterSpacing:'.04em',background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1}}>Marea</button>
      <div style={{display:'flex',gap:'2.8rem'}}>
        {links.slice(0,3).map(([id,lbl]) => <button key={id} onClick={()=>go(id)} style={lkS(id)}>{lbl}</button>)}
      </div>
      <button onClick={()=>go('contact')} className="btn bb" style={{fontSize:'.68rem',padding:'.78rem 1.7rem'}}>Book a Table</button>
    </nav>
  );
}

        <div style={{position:'absolute',bottom:'2rem',left:'3rem',background:'var(--navy)',padding:'1.5rem 2rem',zIndex:2}}>
          <div style={{fontSize:'.6rem',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--bronze)',marginBottom:'.4rem'}}>Marea Restaurant</div>
          <p style={{fontSize:'.8rem',color:'rgba(255,255,255,.65)',lineHeight:1.7}}>Kavaklıdere Cad. No: 42<br/>Çankaya, Ankara</p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP
   ═══════════════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#C87A53","serifFont":"Cormorant Garamond"}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState(() => sessionStorage.getItem('marea_p') || 'home');

  const go = p => { setPage(p); sessionStorage.setItem('marea_p', p); window.scrollTo({top:0,behavior:'smooth'}); };

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--bronze', t.accentColor);
    r.style.setProperty('--bronze-d', shade(t.accentColor, -22));
    r.style.setProperty('--sfv', "'" + t.serifFont + "'");
  }, [t.accentColor, t.serifFont]);

  const pages = {home:<HomePage go={go}/>, menu:<MenuPage go={go}/>, gallery:<GalleryPage go={go}/>, contact:<ContactPage/>};

  return (
    <div>
      <Nav page={page} go={go}/>
      <main key={page}>{pages[page] || pages.home}</main>
      <Footer go={go}/>
      <TweaksPanel>
        <TweakSection label="Accent Color"/>
        <TweakColor label="Vurgu Rengi" value={t.accentColor} options={['#C87A53','#B0912A','#7B9E6B','#9B4F4F']} onChange={v=>setTweak('accentColor',v)}/>
        <TweakSection label="Typography"/>
        <TweakRadio label="Serif Font" value={t.serifFont} options={['Cormorant Garamond','Playfair Display']} onChange={v=>setTweak('serifFont',v)}/>
      </TweaksPanel>
    </div>
  );
}

function shade(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255,Math.max(0,(n>>16)+amt));
  const g = Math.min(255,Math.max(0,((n>>8)&0xff)+amt));
  const b = Math.min(255,Math.max(0,(n&0xff)+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
